name: Appium Tusky CI — Test & Publish Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  test-and-report:
    name: Run Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Restore previous Allure history (trend graphs) ─────────────────
      - name: Restore Allure history
        uses: actions/cache@v4
        with:
          path: .allure-history
          key: allure-history-${{ github.ref_name }}
          restore-keys: |
            allure-history-main
            allure-history-

      # ── 4. Enable KVM for Android Emulator (required on ubuntu-latest) ────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 5. Start Android Emulator (API 29) ────────────────────────────────
      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          avd-name: android_emulator
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true

      # ── 6. Install Appium & UiAutomator2 driver ───────────────────────────
      - name: Install Appium & UiAutomator2
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium &
          sleep 5

      # ── 7. Download Tusky APK ─────────────────────────────────────────────
      - name: Download Tusky APK
        run: |
          mkdir -p apps
          curl -L "https://github.com/tuskyapp/Tusky/releases/download/v26.1/Tusky-26.1.apk" -o apps/tusky.apk

      # ── 8. Copy Allure history into results directory before run ──────────
      - name: Inject Allure history into results
        run: |
          mkdir -p target/allure-results/history
          if [ -d .allure-history ] && [ "$(ls -A .allure-history)" ]; then
            cp -r .allure-history/. target/allure-results/history/
            echo "Restored Allure history"
          else
            echo "No Allure history found — first run"
          fi

      # ── 9. Run tests (failures tolerated, report still generates) ─────────
      - name: Run Appium Tests
        run: mvn surefire:test -Dsurefire.failIfNoSpecifiedTests=false || true

      # ── 10. Generate Allure report ────────────────────────────────────────
      - name: Generate Allure Report
        run: mvn allure:report

      # ── 11. Backup Allure history for the next run ────────────────────────
      - name: Backup Allure history
        run: |
          mkdir -p .allure-history
          if [ -d target/site/allure-maven-plugin/history ]; then
            cp -r target/site/allure-maven-plugin/history/. .allure-history/
            echo "Saved Allure history"
          fi

      # ── 12. Upload raw allure results as artifact ─────────────────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      # ── 13. Deploy Allure HTML report to GitHub Pages ─────────────────────
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          commit_message: "ci: update Allure report for commit ${{ github.sha }}"
