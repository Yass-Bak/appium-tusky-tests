name: Appium Tusky CI - Test & Publish Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:    # Manual trigger from GitHub UI

jobs:
  test-and-report:
    name: Run Tests & Publish Allure Report
    runs-on: ubuntu-latest
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 0  # Skip graceful wait, kill immediately

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Set up Node.js (required for Appium)
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Restore previous Allure history (trend graphs)
      - name: Restore Allure history
        uses: actions/cache@v4
        with:
          path: .allure-history
          key: allure-history-${{ github.ref_name }}
          restore-keys: |
            allure-history-main
            allure-history-

      # 5. Enable KVM for the Android Emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 6. Install Appium globally
      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      # 7. Download Tusky APK
      - name: Download Tusky APK
        run: |
          mkdir -p apps
          curl -L "https://github.com/tuskyapp/Tusky/releases/download/v26.1/Tusky-26.1.apk" -o apps/tusky.apk

      # 8. Inject prior Allure history into results directory
      - name: Inject Allure history
        run: |
          mkdir -p target/allure-results/history
          if [ -d .allure-history ] && [ "$(ls -A .allure-history 2>/dev/null)" ]; then
            cp -r .allure-history/. target/allure-results/history/
            echo "Allure history restored."
          else
            echo "First run - no prior history."
          fi

      # 9. Write the test-runner bash script to disk
      #    (android-emulator-runner runs each script: line in its own sh -c,
      #     so multi-line constructs must live in a real file)
      - name: Create test runner script
        run: |
          cat > /tmp/run-tests.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "=== Starting Appium server ==="
          appium --log appium-server.log &

          echo "=== Waiting for Appium to be ready (max 60 s) ==="
          TIMEOUT=60
          ELAPSED=0
          until curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "ERROR: Appium did not start within ${TIMEOUT}s" >&2
              cat appium-server.log >&2
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          echo "=== Appium ready after ${ELAPSED}s ==="

          echo "=== Running Maven tests ==="
          mvn test || true

          echo "=== Shutting down emulator ==="
          adb -s emulator-5554 emu kill || true
          SCRIPT
          chmod +x /tmp/run-tests.sh

      # 10. Run the script inside the emulator lifetime
      - name: Run Appium Tests on Android Emulator
        timeout-minutes: 25
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          avd-name: android_emulator
          emulator-boot-timeout: 300
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash /tmp/run-tests.sh

      # 10. Backup Allure history for the next run
      - name: Backup Allure history
        if: always()
        run: |
          mkdir -p .allure-history
          if [ -d target/site/allure-maven-plugin/history ]; then
            cp -r target/site/allure-maven-plugin/history/. .allure-history/
            echo "Allure history saved."
          fi

      # 11. Upload raw Allure results as a downloadable artifact
      - name: Upload Allure Results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      # 12. Upload Appium server log for debugging
      - name: Upload Appium server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-server-log
          path: appium-server.log
          retention-days: 7

      # 13. Deploy Allure HTML report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          commit_message: "ci: update Allure report [${{ github.sha }}]"
